<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ea580c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#050505" />
  <rect width="400" height="400" fill="url(#bgGrad)" />
  
  <!-- Tech Orbits -->
  <g transform="translate(200, 200)">
    <circle cx="0" cy="0" r="140" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="8,12" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="115" fill="none" stroke="#fb923c" stroke-width="1" opacity="0.2">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="40s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#fef08a" stroke-width="0.5" opacity="0.1" />
    
    <!-- Nodes -->
    <circle cx="0" cy="-140" r="5" fill="#fb923c" filter="url(#glow)" />
    <circle cx="-115" cy="0" r="4" fill="#fef08a" filter="url(#glow)" />
    <circle cx="98" cy="98" r="6" fill="#ea580c" filter="url(#glow)" />
  </g>
  
  <!-- Center Element -->
  <circle cx="200" cy="200" r="65" fill="#f97316" opacity="0.1" />
  <circle cx="200" cy="200" r="85" fill="none" stroke="url(#vGrad)" stroke-width="2" opacity="0.5" stroke-dasharray="4,4" />
  
  <!-- Monogram -->
  <text x="200" y="235" font-family="'Inter', sans-serif" font-weight="800" font-size="120" fill="url(#vGrad)" text-anchor="middle" filter="url(#glow)">V</text>
  <text x="200" y="235" font-family="'Inter', sans-serif" font-weight="800" font-size="120" fill="#fff" text-anchor="middle">V</text>
</svg>