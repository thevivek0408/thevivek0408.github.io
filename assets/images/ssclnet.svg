<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#050505"/>
  <rect width="800" height="500" fill="url(#grad1)"/>
  
  <g stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.6" transform="translate(100, 30)">
    <path d="M300,150 C200,150 150,250 200,350 C230,400 280,420 300,420 C320,420 370,400 400,350 C450,250 400,150 300,150 Z" />
    <path d="M300,150 L300,420" stroke-dasharray="5,5" />
    <circle cx="250" cy="200" r="4" fill="#60a5fa" filter="url(#glow)"/>
    <circle cx="350" cy="200" r="4" fill="#60a5fa" filter="url(#glow)"/>
    <circle cx="220" cy="270" r="4" fill="#60a5fa" filter="url(#glow)"/>
    <circle cx="380" cy="270" r="4" fill="#60a5fa" filter="url(#glow)"/>
    <circle cx="300" cy="380" r="4" fill="#60a5fa" filter="url(#glow)"/>
    
    <line x1="250" y1="200" x2="220" y2="270" stroke-width="1" />
    <line x1="350" y1="200" x2="380" y2="270" stroke-width="1" />
    <line x1="300" y1="230" x2="250" y2="200" stroke-width="1" />
    <line x1="300" y1="230" x2="350" y2="200" stroke-width="1" />
    <line x1="300" y1="230" x2="300" y2="380" stroke-width="1" stroke-dasharray="2,2"/>
  </g>
