<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="boxGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="#020617"/>
  <rect width="800" height="500" fill="url(#boxGrad)"/>
  
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="500" height="300" rx="12" fill="#1e1b4b" stroke="#818cf8" stroke-width="3" opacity="0.9"/>
    
    <!-- Top bar -->
    <rect x="0" y="0" width="500" height="40" rx="12" fill="#312e81" opacity="0.6"/>
    <circle cx="20" cy="20" r="6" fill="#ef4444"/>
    <circle cx="45" cy="20" r="6" fill="#facc15"/>
    <circle cx="70" cy="20" r="6" fill="#4ade80"/>
    
    <!-- Sidebar -->
    <rect x="0" y="40" width="120" height="260" fill="#312e81" opacity="0.3"/>
    
    <!-- Content lines -->
    <line x1="150" y1="80" x2="350" y2="80" stroke="#a5b4fc" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <line x1="150" y1="120" x2="450" y2="120" stroke="#c7d2fe" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <line x1="180" y1="160" x2="400" y2="160" stroke="#818cf8" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <line x1="180" y1="200" x2="300" y2="200" stroke="#e0e7ff" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Code cursor -->
    <rect x="315" y="195" width="10" height="15" fill="#a5b4fc">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>